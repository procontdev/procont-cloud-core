name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore API
        run: dotnet restore ProcontCloudCore.sln

      - name: Build API
        run: dotnet build ProcontCloudCore.sln --configuration Release --no-restore

  web-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --workspaces

      - name: Lint web and shared
        run: npm run lint

      - name: Build web
        run: npm run build -w apps/web
