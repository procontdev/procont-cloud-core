name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: procont_core
          POSTGRES_USER: procont_user
          POSTGRES_PASSWORD: procont_local_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procont_user -d procont_core"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore API
        run: dotnet restore ProcontCloudCore.sln

      - name: Build API
        run: dotnet build ProcontCloudCore.sln --configuration Release --no-restore

      - name: Apply migrations
        env:
          PROCONT_CONNECTIONSTRINGS__POSTGRES: Host=localhost;Port=5432;Database=procont_core;Username=procont_user;Password=procont_local_password
          PROCONT_JWT__KEY: ci-jwt-key-at-least-32-chars-long
        run: dotnet ef database update --project apps/api/src/Infrastructure/Infrastructure.csproj --startup-project apps/api/src/Api/Api.csproj

      - name: Test API
        env:
          PROCONT_CONNECTIONSTRINGS__POSTGRES: Host=localhost;Port=5432;Database=procont_core;Username=procont_user;Password=procont_local_password
          PROCONT_JWT__KEY: ci-jwt-key-at-least-32-chars-long
          PROCONT_SECURITY__SECRETPROVIDER: github-actions-secrets
          PROCONT_SECURITY__SECRETREFERENCE: PROCONT_CONNECTIONSTRINGS__POSTGRES,PROCONT_JWT__KEY
        run: dotnet test ProcontCloudCore.sln --configuration Release --no-build --collect:"XPlat Code Coverage"

  web-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --workspaces

      - name: Lint web and shared
        run: npm run lint

      - name: Build web
        run: npm run build -w apps/web
