version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: procont-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-procont_core}
      POSTGRES_USER: ${POSTGRES_USER:-procont_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-procont_local_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: procont-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
